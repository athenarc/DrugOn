globals:
  label_col: label
  test_size: 0.2
  random_state: 42
  scoring: roc_auc
  cv: 5
  n_jobs: -1
  drop_prefixes: []        # e.g. ["measurement_"]
  # Sampling for expensive explainers (KernelExplainer); keeps runtime sane
  shap_kernel_sample_size: 200
  shap_background_size: 100

models:
  - name: xgboost
    estimator: xgboost.XGBClassifier
    # optional fixed params applied before grid search
    fixed_params:
      objective: binary:logistic
      eval_metric: auc
      tree_method: hist         # MUCH faster for 180K rows
      max_bin: 256              # safe, fast, good accuracy
      scale_pos_weight: 1.6     # based on neg/pos 
      subsample: 0.8            # good for medium datasets
      colsample_bytree: 0.8     # helps generalization
    # choose one or many scalers to search for numerics
    numeric_transformers: [passthrough]
    param_grid:
      xgb__n_estimators: [150, 300, 600]          # 2 values
      xgb__learning_rate: [0.01, 0.03, 0.1]       # 2 values
      xgb__max_depth: [2, 4]                 # 2 values
      xgb__min_child_weight: [1, 3]          # 2 values
      xgb__reg_lambda: [1.0, 3.0]  

